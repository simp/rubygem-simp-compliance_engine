---
name: PR Tests

'on':
  push:
    branches:
      - main

  pull_request:

jobs:
  validate-versions:
    name: 'Validate Versions'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Verify versions match
        run: |
          ruby << 'RUBY'
          require "json"

          metadata_version = JSON.parse(File.read("metadata.json"))["version"]

          version_rb = File.read("lib/compliance_engine/version.rb")
          version_rb_match = version_rb.match(/VERSION\s*=\s*['"]([^'"]+)['"]/)
          raise "Could not parse version from lib/compliance_engine/version.rb" unless version_rb_match
          version_rb_version = version_rb_match[1]

          changelog_match = File.read("CHANGELOG.md").match(/^###\s+(\d+\.\d+\.\d+)/)
          raise "Could not parse version from CHANGELOG.md" unless changelog_match
          changelog_version = changelog_match[1]

          errors = []
          errors << "metadata.json (#{metadata_version}) != version.rb (#{version_rb_version})" unless metadata_version == version_rb_version
          errors << "metadata.json (#{metadata_version}) != CHANGELOG.md (#{changelog_version})" unless metadata_version == changelog_version

          if errors.empty?
            puts "All versions match: #{metadata_version}"
          else
            errors.each { |e| puts "ERROR: #{e}" }
            exit 1
          end
          RUBY

  ruby-style:
    name: 'Ruby Style'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Install Ruby"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.2
          bundler-cache: true
      - run: bundle exec rake rubocop

  spec-tests:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '3.2'  # Puppet 8
          - '3.3'
          - '3.4'
          - '4.0'  # Latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Spec tests
        run: |
          if [ "${{ matrix.ruby }}" = "4.0" ]; then
            bundle exec rspec spec/classes
          else
            bundle exec rake parallel_spec
          fi

  acceptance-apply:
    name: 'Acceptance: puppet apply (alma9)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.9'
      - name: Install dependencies (with acceptance group)
        run: bundle install
        env:
          BUNDLE_WITH: acceptance
      - name: Run puppet apply acceptance tests
        run: bundle exec rake acceptance:apply
        env:
          BEAKER_SETFILE: spec/acceptance/nodesets/apply.yml
          BEAKER_PUPPET_COLLECTION: openvox8
          BEAKER_HYPERVISOR: docker

  acceptance-server:
    name: 'Acceptance: puppet agent + openvox-server (alma9)'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: 'basic server/agent'
            spec: '02_server_agent_spec.rb'
            label: 'basic'
          - name: 'cache leakage'
            spec: '03_cache_leakage_spec.rb'
            label: 'cache'
          - name: 'environment leakage'
            spec: '04_env_leakage_spec.rb'
            label: 'env-leakage'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.9'
      - name: Install dependencies (with acceptance group)
        run: bundle install
        env:
          BUNDLE_WITH: acceptance
      - name: Run ${{ matrix.suite.name }} acceptance tests
        run: bundle exec rspec spec/acceptance/${{ matrix.suite.spec }}
        env:
          BEAKER_SETFILE: spec/acceptance/nodesets/server_agent.yml
          BEAKER_PUPPET_COLLECTION: openvox8
          BEAKER_HYPERVISOR: docker
